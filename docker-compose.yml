# E-Commerce Review Intelligence Platform — full local stack.
# Bring core infra up with:  docker compose up -d
# (Spark jobs / producers are launched via the Makefile.)

services:
  # ── Streaming ─────────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.8
    environment: [ALLOW_ANONYMOUS_LOGIN=yes]
    ports: ["2181:2181"]

  kafka:
    image: bitnami/kafka:3.4
    ports: ["9092:9092"]
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://host.docker.internal:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on: [zookeeper]

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]

  # ── Data lake (S3) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes: ["minio_data:/data"]

  # ── Warehouse ─────────────────────────────────────────────
  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      - POSTGRES_DB=reviews_dw
      - POSTGRES_USER=dw
      - POSTGRES_PASSWORD=dw
    volumes: ["pg_data:/var/lib/postgresql/data"]

  # ── Document store + search ───────────────────────────────
  mongo:
    image: mongo:6
    ports: ["27017:27017"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongoadmin
      - MONGO_INITDB_ROOT_PASSWORD=secret
    volumes: ["mongo_data:/data/db"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports: ["9200:9200"]

  # ── Processing ────────────────────────────────────────────
  spark:
    image: bitnami/spark:3.5
    environment: [SPARK_MODE=master]
    ports: ["7077:7077", "8090:8080"]

  spark-worker:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
    depends_on: [spark]

  # ── Experiment tracking ───────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports: ["5000:5000"]
    volumes: ["mlflow_data:/mlflow"]

  # ── App: analytics API + dashboard ────────────────────────
  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    env_file: [.env]
    depends_on: [postgres]

  dashboard:
    build: .
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    environment: [ANALYTICS_API=http://api:8000]
    depends_on: [api]

volumes:
  minio_data:
  pg_data:
  mongo_data:
  mlflow_data:
